# Hyprpaper — static wallpaper
#
# Place your wallpaper at: ~/.local/share/wallpapers/default.jpg
# To use a different image, change the path below and run:
#   hyprctl hyprpaper reload

preload = ~/.local/share/wallpapers/default.jpg

# Apply to all monitors (empty string = all)
wallpaper = , ~/.local/share/wallpapers/default.jpg

# Disable IPC after setup to save resources (set false if using swww or dynamic switching)
ipc = off

# Fill mode: contain, cover, fit, tile
# Default is "cover" which scales to fill the screen
splash = false
