# Visual theme — Tokyo Night
#
# Palette:
#   night   = #1a1b26    storm     = #24283b
#   fg      = #c0caf5    comment   = #565f89
#   red     = #f7768e    orange    = #ff9e64
#   yellow  = #e0af68    green     = #9ece6a
#   teal    = #73daca    blue      = #7aa2f7
#   cyan    = #7dcfff    magenta   = #bb9af7

general {
    gaps_in = 4
    gaps_out = 8
    border_size = 2
    col.active_border = rgb(7aa2f7) rgb(bb9af7) 45deg
    col.inactive_border = rgb(24283b)
    layout = dwindle
    resize_on_border = true
}

decoration {
    rounding = 8

    blur {
        enabled = true
        size = 6
        passes = 3
        noise = 0.02
        new_optimizations = true
        xray = false
    }

    shadow {
        enabled = true
        range = 15
        render_power = 3
        color = rgba(1a1b2680)
    }

    dim_inactive = true
    dim_strength = 0.15
}

animations {
    enabled = true

    # Smooth bezier curves
    bezier = ease, 0.25, 0.1, 0.25, 1
    bezier = easeOut, 0, 0, 0.58, 1
    bezier = easeInOut, 0.42, 0, 0.58, 1
    bezier = overshot, 0.05, 0.9, 0.1, 1.1

    # Window open/close
    animation = windowsIn, 1, 4, overshot, slide
    animation = windowsOut, 1, 4, easeInOut, slide
    animation = windowsMove, 1, 3, easeInOut

    # Fade
    animation = fadeIn, 1, 3, ease
    animation = fadeOut, 1, 3, ease

    # Workspace switch
    animation = workspaces, 1, 4, easeInOut, slide

    # Border color transition
    animation = border, 1, 5, ease
    animation = borderangle, 1, 30, ease, loop
}

dwindle {
    pseudotile = true
    preserve_split = true
    smart_split = false
    smart_resizing = true
}

master {
    new_status = master
    mfact = 0.55
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    disable_splash_rendering = true
    mouse_move_enables_dpms = true
    key_press_enables_dpms = true
    vfr = true
}
