# Input device configuration

input {
    kb_layout = us
    # kb_variant =
    # kb_options = caps:escape    # uncomment to map CapsLock → Escape

    follow_mouse = 1
    sensitivity = 0
    accel_profile = flat

    touchpad {
        natural_scroll = true
        tap-to-click = true
        disable_while_typing = true
        scroll_factor = 1.0
    }
}

# Per-device overrides (list devices with: hyprctl devices)
# device {
#     name = epic-mouse-v1
#     sensitivity = -0.5
# }

gestures {
    workspace_swipe = true
    workspace_swipe_fingers = 3
    workspace_swipe_distance = 300
}
