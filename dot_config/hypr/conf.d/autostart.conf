# Autostart — exec-once runs only on Hyprland launch, not config reload

# Desktop shell (bar)
exec-once = quickshell

# Notification daemon
exec-once = mako

# Authentication agent (for GUI sudo prompts)
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1

# Clipboard history
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# Cursor theme
exec-once = hyprctl setcursor Adwaita 24

# Portal for screen sharing / file dialogs
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP

# ── Wallpaper ───────────────────────────────────────────────────────────────
# swww daemon for wallpaper management with rotation
exec-once = swww-daemon && ~/.config/hypr/scripts/wallpaper-rotate.sh
# Start wallpaper rotation timer
exec-once = systemctl --user start wallpaper-rotate.timer

# Idle / lock daemon
exec-once = hypridle

# ── Optional (uncomment as needed) ──────────────────────────────────────────

# Night light (auto color temperature)
# exec-once = wlsunset -l 37.7 -L -122.4
