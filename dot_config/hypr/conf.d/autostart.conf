# Autostart — exec-once runs only on Hyprland launch, not config reload

# Desktop shell (bar)
exec-once = quickshell

# Notification daemon
exec-once = mako

# Authentication agent (for GUI sudo prompts)
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1

# Clipboard history
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# Cursor theme
exec-once = hyprctl setcursor Adwaita 24

# Portal for screen sharing / file dialogs
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP

# ── Wallpaper ───────────────────────────────────────────────────────────────
# Choose ONE wallpaper daemon — swww supports animated wallpapers,
# hyprpaper is a lightweight option for static wallpapers only.
# swww (animated wallpapers, default)
exec-once = swww-daemon && swww img ~/Pictures/Wallpapers/default.png
# hyprpaper (static wallpapers — uncomment if you prefer it over swww)
# exec-once = hyprpaper

# Idle / lock daemon
exec-once = hypridle

# ── Optional (uncomment as needed) ──────────────────────────────────────────

# Night light (auto color temperature)
# exec-once = wlsunset -l 37.7 -L -122.4
