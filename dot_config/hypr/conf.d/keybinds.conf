# Keybindings
# SUPER as mod — non-conflicting with terminal binds (Ctrl+Space = tmux)
# Vim-style hjkl navigation — consistent with nvim/tmux

$mod = SUPER

# ── Launchers ────────────────────────────────────────────────────────────────

bind = $mod, Return, exec, kitty || foot
bind = $mod, D, exec, rofi -show drun
bind = $mod, R, exec, rofi -show run
bind = $mod, period, exec, rofi -show window
bind = $mod, B, exec, firefox

# ── Window Management ────────────────────────────────────────────────────────

bind = $mod, Q, killactive
bind = $mod, F, fullscreen, 0
bind = $mod SHIFT, F, fullscreen, 1
bind = $mod, V, togglefloating
bind = $mod, P, pseudo
bind = $mod, S, togglesplit
bind = $mod, G, togglegroup

# ── Focus (vim-style) ────────────────────────────────────────────────────────

bind = $mod, H, movefocus, l
bind = $mod, J, movefocus, d
bind = $mod, K, movefocus, u
bind = $mod, L, movefocus, r

# Arrow keys as alternative
bind = $mod, Left, movefocus, l
bind = $mod, Down, movefocus, d
bind = $mod, Up, movefocus, u
bind = $mod, Right, movefocus, r

# ── Move Windows ─────────────────────────────────────────────────────────────

bind = $mod SHIFT, H, movewindow, l
bind = $mod SHIFT, J, movewindow, d
bind = $mod SHIFT, K, movewindow, u
bind = $mod SHIFT, L, movewindow, r

bind = $mod SHIFT, Left, movewindow, l
bind = $mod SHIFT, Down, movewindow, d
bind = $mod SHIFT, Up, movewindow, u
bind = $mod SHIFT, Right, movewindow, r

# ── Resize (submap for persistent resize mode) ──────────────────────────────

bind = $mod CTRL, H, resizeactive, -40 0
bind = $mod CTRL, J, resizeactive, 0 40
bind = $mod CTRL, K, resizeactive, 0 -40
bind = $mod CTRL, L, resizeactive, 40 0

# Resize submap — enter with mod+R (hold Escape or mod+R to exit)
bind = $mod SHIFT, R, submap, resize

submap = resize
binde = , H, resizeactive, -20 0
binde = , J, resizeactive, 0 20
binde = , K, resizeactive, 0 -20
binde = , L, resizeactive, 20 0
binde = , Left, resizeactive, -20 0
binde = , Down, resizeactive, 0 20
binde = , Up, resizeactive, 0 -20
binde = , Right, resizeactive, 20 0
bind = , Escape, submap, reset
bind = $mod SHIFT, R, submap, reset
submap = reset

# ── Workspaces ───────────────────────────────────────────────────────────────

bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9

bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9

# Scroll through workspaces
bind = $mod, mouse_down, workspace, e+1
bind = $mod, mouse_up, workspace, e-1
bind = $mod, bracketright, workspace, e+1
bind = $mod, bracketleft, workspace, e-1

# ── Special Workspace (scratchpad) ──────────────────────────────────────────

bind = $mod, grave, togglespecialworkspace, scratchpad
bind = $mod SHIFT, grave, movetoworkspace, special:scratchpad

# ── Screenshots (grim + slurp) ──────────────────────────────────────────────

# Full screen → clipboard
bind = , Print, exec, grim - | wl-copy
# Region select → clipboard
bind = $mod, Print, exec, grim -g "$(slurp)" - | wl-copy
# Region select → file
bind = $mod SHIFT, Print, exec, mkdir -p ~/Pictures/Screenshots && grim -g "$(slurp)" ~/Pictures/Screenshots/$(date +%Y%m%d_%H%M%S).png

# ── Utilities ────────────────────────────────────────────────────────────────

# Color picker → clipboard
bind = $mod, C, exec, hyprpicker -a
# Lock screen (use loginctl if hyprlock not available)
bind = $mod SHIFT, L, exec, hyprlock || loginctl lock-session
# Dismiss notification
bind = $mod, N, exec, makoctl dismiss
bind = $mod SHIFT, N, exec, makoctl dismiss --all
# Clipboard history (if cliphist installed)
bind = $mod SHIFT, V, exec, cliphist list | rofi -dmenu | cliphist decode | wl-copy

# ── Session ──────────────────────────────────────────────────────────────────

bind = $mod SHIFT, E, exit

# ── Mouse Bindings ───────────────────────────────────────────────────────────

bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# ── Media / Brightness ───────────────────────────────────────────────────────

binde = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
binde = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bind = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

binde = , XF86MonBrightnessUp, exec, brightnessctl set +5%
binde = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

bind = , XF86AudioPlay, exec, playerctl play-pause
bind = , XF86AudioNext, exec, playerctl next
bind = , XF86AudioPrev, exec, playerctl previous

# ── Window Snapping ─────────────────────────────────────────────────────────

bind = $mod CTRL, Left, exec, ~/.config/hypr/scripts/snap-window.sh left
bind = $mod CTRL, Right, exec, ~/.config/hypr/scripts/snap-window.sh right
bind = $mod CTRL, Up, exec, ~/.config/hypr/scripts/snap-window.sh top
bind = $mod CTRL, Down, exec, ~/.config/hypr/scripts/snap-window.sh bottom
bind = $mod CTRL SHIFT, Left, exec, ~/.config/hypr/scripts/snap-window.sh topleft
bind = $mod CTRL SHIFT, Right, exec, ~/.config/hypr/scripts/snap-window.sh topright
bind = $mod CTRL ALT, Left, exec, ~/.config/hypr/scripts/snap-window.sh bottomleft
bind = $mod CTRL ALT, Right, exec, ~/.config/hypr/scripts/snap-window.sh bottomright
bind = $mod, M, exec, ~/.config/hypr/scripts/snap-window.sh center

# ── Layout Switching ────────────────────────────────────────────────────────

bind = $mod, TAB, exec, ~/.config/hypr/scripts/switch-layout.sh

# ── Password Manager ────────────────────────────────────────────────────────
# NOTE: Super+P conflicts with pseudo tiling, using Super+O instead

bind = $mod, O, exec, 1password --quick-access
