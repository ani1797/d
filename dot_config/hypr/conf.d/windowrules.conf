# Window rules

# ── Float rules ──────────────────────────────────────────────────────────────

# Dialogs
windowrule = float, title:^(Open)(.*)$
windowrule = float, title:^(Save)(.*)$
windowrule = float, title:^(Confirm)(.*)$
windowrule = float, title:^(File Operation)(.*)$
windowrule = float, title:^(Choose)(.*)$

# System utilities
windowrule = float, class:^(pavucontrol)$
windowrule = float, class:^(nm-connection-editor)$
windowrule = float, class:^(blueman-manager)$
windowrule = float, class:^(gnome-calculator)$
windowrule = float, class:^(.blueman-manager-wrapped)$
windowrule = float, class:^(org.gnome.Calculator)$

# Authentication prompts
windowrule = float, class:^(polkit-gnome-authentication-agent-1)$

# Image/media viewers
windowrule = float, class:^(imv)$
windowrule = float, class:^(mpv)$
windowrule = float, class:^(org.gnome.Loupe)$

# ── Opacity ──────────────────────────────────────────────────────────────────

# Terminals
windowrule = opacity 0.92 0.88, class:^(kitty)$
windowrule = opacity 0.92 0.88, class:^(foot)$
windowrule = opacity 0.92 0.88, class:^(Alacritty)$

# Editors — slightly more opaque
windowrule = opacity 0.95 0.92, class:^(code-url-handler)$
windowrule = opacity 0.95 0.92, class:^(code-insiders-url-handler)$
windowrule = opacity 0.95 0.92, class:^(codium-url-handler)$

# Browsers — fully opaque for accurate colors
windowrule = opacity 1.0 1.0, class:^(firefox)$
windowrule = opacity 1.0 1.0, class:^(chromium)$
windowrule = opacity 1.0 1.0, class:^(google-chrome)$
windowrule = opacity 1.0 1.0, class:^(brave-browser)$

# File managers
windowrule = opacity 0.94 0.90, class:^(org.gnome.Nautilus)$
windowrule = opacity 0.94 0.90, class:^(thunar)$

# ── Picture-in-Picture ───────────────────────────────────────────────────────

windowrule = float, title:^(Picture-in-Picture)$
windowrule = pin, title:^(Picture-in-Picture)$
windowrule = size 480 270, title:^(Picture-in-Picture)$
windowrule = move 100%-490 40, title:^(Picture-in-Picture)$
windowrule = opacity 1.0, title:^(Picture-in-Picture)$

# ── Workspace Assignments (uncomment to pin apps to workspaces) ──────────────
# windowrule = workspace 1, class:^(kitty)$
# windowrule = workspace 2, class:^(firefox)$
# windowrule = workspace 3, class:^(code-url-handler)$
# windowrule = workspace 9, class:^(discord)$
# windowrule = workspace 9, class:^(Slack)$

# ── xdg-desktop-portal ──────────────────────────────────────────────────────

windowrule = float, class:^(xdg-desktop-portal-gtk)$
windowrule = float, class:^(xdg-desktop-portal-hyprland)$
