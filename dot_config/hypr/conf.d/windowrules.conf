# Window rules

# ── Float rules ──────────────────────────────────────────────────────────────

# Dialogs
windowrulev3 = float, title:^(Open)(.*)$
windowrulev3 = float, title:^(Save)(.*)$
windowrulev3 = float, title:^(Confirm)(.*)$
windowrulev3 = float, title:^(File Operation)(.*)$
windowrulev3 = float, title:^(Choose)(.*)$

# System utilities
windowrulev3 = float, class:^(pavucontrol)$
windowrulev3 = float, class:^(nm-connection-editor)$
windowrulev3 = float, class:^(blueman-manager)$
windowrulev3 = float, class:^(gnome-calculator)$
windowrulev3 = float, class:^(.blueman-manager-wrapped)$
windowrulev3 = float, class:^(org.gnome.Calculator)$

# Authentication prompts
windowrulev3 = float, class:^(polkit-gnome-authentication-agent-1)$

# Image/media viewers
windowrulev3 = float, class:^(imv)$
windowrulev3 = float, class:^(mpv)$
windowrulev3 = float, class:^(org.gnome.Loupe)$

# ── Opacity ──────────────────────────────────────────────────────────────────

# Terminals
windowrulev3 = opacity 0.92 0.88, class:^(kitty)$
windowrulev3 = opacity 0.92 0.88, class:^(foot)$
windowrulev3 = opacity 0.92 0.88, class:^(Alacritty)$

# Editors — slightly more opaque
windowrulev3 = opacity 0.95 0.92, class:^(code-url-handler)$
windowrulev3 = opacity 0.95 0.92, class:^(code-insiders-url-handler)$
windowrulev3 = opacity 0.95 0.92, class:^(codium-url-handler)$

# Browsers — fully opaque for accurate colors
windowrulev3 = opacity 1.0 1.0, class:^(firefox)$
windowrulev3 = opacity 1.0 1.0, class:^(chromium)$
windowrulev3 = opacity 1.0 1.0, class:^(google-chrome)$
windowrulev3 = opacity 1.0 1.0, class:^(brave-browser)$

# File managers
windowrulev3 = opacity 0.94 0.90, class:^(org.gnome.Nautilus)$
windowrulev3 = opacity 0.94 0.90, class:^(thunar)$

# ── Picture-in-Picture ───────────────────────────────────────────────────────

windowrulev3 = float, title:^(Picture-in-Picture)$
windowrulev3 = pin, title:^(Picture-in-Picture)$
windowrulev3 = size 480 270, title:^(Picture-in-Picture)$
windowrulev3 = move 100%-490 40, title:^(Picture-in-Picture)$
windowrulev3 = opacity 1.0, title:^(Picture-in-Picture)$

# ── Workspace Assignments (uncomment to pin apps to workspaces) ──────────────
# windowrulev3 = workspace 1, class:^(kitty)$
# windowrulev3 = workspace 2, class:^(firefox)$
# windowrulev3 = workspace 3, class:^(code-url-handler)$
# windowrulev3 = workspace 9, class:^(discord)$
# windowrulev3 = workspace 9, class:^(Slack)$

# ── xdg-desktop-portal ──────────────────────────────────────────────────────

windowrulev3 = float, class:^(xdg-desktop-portal-gtk)$
windowrulev3 = float, class:^(xdg-desktop-portal-hyprland)$
