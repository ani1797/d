# Monitor configuration
# Syntax: monitor = name, resolution, position, scale
#
# Examples:
#   monitor = DP-1, 2560x1440@144, 0x0, 1          # primary left
#   monitor = HDMI-A-1, 1920x1080@60, 2560x0, 1    # secondary right
#   monitor = eDP-1, preferred, auto, 1.5           # laptop HiDPI
#   monitor = , preferred, auto, 1, mirror, DP-1    # mirror primary
#
# List available monitors:  hyprctl monitors

# Auto-detect all monitors at native resolution
monitor = , preferred, auto, 1
