# Hyprlock — lock screen configuration
# Style: Tokyo Night
#
# Palette:
#   night   = #1a1b26    storm     = #24283b
#   fg      = #c0caf5    comment   = #565f89
#   red     = #f7768e    orange    = #ff9e64
#   yellow  = #e0af68    green     = #9ece6a
#   teal    = #73daca    blue      = #7aa2f7
#   cyan    = #7dcfff    magenta   = #bb9af7

general {
    hide_cursor = true
    grace = 3
    no_fade_in = false
}

# ── Background ───────────────────────────────────────────────────────────────

background {
    monitor =
    path = ~/.local/share/wallpapers/default.jpg
    blur_passes = 3
    blur_size = 8
    noise = 0.02
    contrast = 0.9
    brightness = 0.6
    vibrancy = 0.2
    vibrancy_darkness = 0.1
}

# ── Time ─────────────────────────────────────────────────────────────────────

label {
    monitor =
    text = $TIME
    color = rgb(c0caf5)
    font_size = 90
    font_family = sans-serif
    halign = center
    valign = center
    position = 0, 200
    shadow_passes = 2
    shadow_size = 3
    shadow_color = rgba(1a1b2680)
}

# ── Date ─────────────────────────────────────────────────────────────────────

label {
    monitor =
    text = cmd[update:60000] date +"%A, %B %d"
    color = rgb(565f89)
    font_size = 22
    font_family = sans-serif
    halign = center
    valign = center
    position = 0, 120
    shadow_passes = 1
    shadow_size = 2
    shadow_color = rgba(1a1b2640)
}

# ── User avatar ──────────────────────────────────────────────────────────────

image {
    monitor =
    path = ~/.face
    size = 100
    rounding = -1
    border_size = 3
    border_color = rgb(7aa2f7)
    halign = center
    valign = center
    position = 0, 30
    shadow_passes = 2
    shadow_size = 3
    shadow_color = rgba(1a1b2680)
}

# ── Password input ───────────────────────────────────────────────────────────

input-field {
    monitor =
    size = 280, 50
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.3
    dots_center = true
    dots_rounding = -1
    outer_color = rgb(7aa2f7)
    inner_color = rgb(24283b)
    font_color = rgb(c0caf5)
    fade_on_empty = true
    fade_timeout = 2000
    placeholder_text = <span foreground="##565f89">Password...</span>
    hide_input = false
    rounding = 8
    check_color = rgb(9ece6a)
    fail_color = rgb(f7768e)
    fail_text = <span foreground="##f7768e">$FAIL</span>
    fail_transition = 300
    capslock_color = rgb(e0af68)
    halign = center
    valign = center
    position = 0, -70
    shadow_passes = 2
    shadow_size = 3
    shadow_color = rgba(1a1b2680)
}
