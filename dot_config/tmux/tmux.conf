# ~/.config/tmux/tmux.conf — lightweight optimized defaults

# --- Terminal & Colors ---
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# --- General ---
set -g mouse on
set -g history-limit 50000
set -g display-time 3000
set -g status-interval 5
set -g focus-events on
set -g set-clipboard on

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Faster escape time (important for vim/neovim users)
set -sg escape-time 0

# --- Prefix ---
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# --- Key Bindings ---
# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display-message "Config reloaded"

# Intuitive splits (open in current path)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New window in current path
bind c new-window -c "#{pane_current_path}"

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Vim-style pane resizing
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Quick window switching
bind -r n next-window
bind -r p previous-window

# --- Copy Mode (vi) ---
setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# --- Theme: Tokyo Night (matching starship prompt) ---
# Palette:
#   night   = #1a1b26    storm     = #24283b
#   fg      = #c0caf5    comment   = #565f89
#   red     = #f7768e    orange    = #ff9e64
#   yellow  = #e0af68    green     = #9ece6a
#   teal    = #73daca    blue      = #7aa2f7
#   cyan    = #7dcfff    magenta   = #bb9af7

# --- Status Bar ---
set -g status-position top
set -g status-style "fg=#c0caf5,bg=#1a1b26"
set -g status-left-length 40
set -g status-right-length 60
set -g status-left "#[fg=#1a1b26,bg=#7aa2f7,bold]  #S #[fg=#7aa2f7,bg=#1a1b26,nobold] "
set -g status-right "#[fg=#24283b,bg=#1a1b26]#[fg=#c0caf5,bg=#24283b] %H:%M #[fg=#7aa2f7,bg=#24283b]#[fg=#1a1b26,bg=#7aa2f7,bold] %d-%b "

# Window status
setw -g window-status-format "#[fg=#565f89,bg=#1a1b26] #I:#W "
setw -g window-status-current-format "#[fg=#1a1b26,bg=#24283b]#[fg=#7aa2f7,bg=#24283b,bold] #I:#W #[fg=#24283b,bg=#1a1b26]"
setw -g window-status-separator ""

# --- Pane Borders ---
set -g pane-border-style "fg=#24283b"
set -g pane-active-border-style "fg=#7aa2f7"

# --- Message/Command Style ---
set -g message-style "fg=#c0caf5,bg=#24283b"
set -g message-command-style "fg=#c0caf5,bg=#24283b"

# --- Copy Mode Highlight ---
setw -g mode-style "fg=#c0caf5,bg=#33467c"

# --- Clock ---
setw -g clock-mode-colour "#7aa2f7"

# --- Activity ---
setw -g monitor-activity on
set -g visual-activity off

# --- fzf Integration ---
# Switch sessions with fzf (prefix + s)
bind s display-popup -E -w 60% -h 60% "\
    tmux list-sessions -F '#{session_name}' | \
    fzf --reverse --header='Switch Session' \
        --preview 'tmux capture-pane -ep -t {}' | \
    xargs -r tmux switch-client -t"

# Switch windows with fzf (prefix + w)
bind w display-popup -E -w 60% -h 60% "\
    tmux list-windows -F '#{window_index}: #{window_name}' | \
    fzf --reverse --header='Switch Window' | \
    cut -d: -f1 | \
    xargs -r tmux select-window -t"
