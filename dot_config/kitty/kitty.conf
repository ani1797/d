# Kitty Configuration — Tokyo Night Theme
# Matches Hyprland, mako, nvim, and starship theme

# Font configuration
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size 12.0

# Cursor
cursor_shape block
cursor_blink_interval 0
cursor #c0caf5
cursor_text_color #1a1b26

# Scrollback
scrollback_lines 10000

# Mouse
mouse_hide_wait 3.0
url_color #7aa2f7
url_style curly

# Window layout
window_padding_width 8
confirm_os_window_close 0
window_border_width 2pt
active_border_color #7aa2f7
inactive_border_color #24283b
hide_window_decorations no

# Tab bar
tab_bar_edge bottom
tab_bar_style powerline
tab_powerline_style slanted
tab_bar_background #1a1b26
active_tab_foreground #c0caf5
active_tab_background #7aa2f7
inactive_tab_foreground #565f89
inactive_tab_background #24283b

# Tokyo Night Color Scheme
foreground #c0caf5
background #1a1b26
selection_foreground #c0caf5
selection_background #33467c

# Black
color0 #15161e
color8 #414868

# Red
color1 #f7768e
color9 #f7768e

# Green
color2  #9ece6a
color10 #9ece6a

# Yellow
color3  #e0af68
color11 #e0af68

# Blue
color4  #7aa2f7
color12 #7aa2f7

# Magenta
color5  #bb9af7
color13 #bb9af7

# Cyan
color6  #7dcfff
color14 #7dcfff

# White
color7  #a9b1d6
color15 #c0caf5

# Advanced
shell .
editor .
allow_remote_control yes
listen_on unix:/tmp/kitty

# Performance
repaint_delay 10
input_delay 3
sync_to_monitor yes

# Animations (requires Kitty 0.29+)
window_resize_draw_strategy static

# Bell
enable_audio_bell no
visual_bell_duration 0.0
visual_bell_color #f7768e

# Clipboard
clipboard_control write-clipboard write-primary read-clipboard-ask read-primary-ask

# Background opacity
background_opacity 1.0
background_blur 1

# Keyboard shortcuts
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard
map ctrl+shift+t new_tab
map ctrl+shift+w close_tab
map ctrl+shift+right next_tab
map ctrl+shift+left previous_tab
map ctrl+shift+equal change_font_size all +1.0
map ctrl+shift+minus change_font_size all -1.0
map ctrl+shift+backspace change_font_size all 0
